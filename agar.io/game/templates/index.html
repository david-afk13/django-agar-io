<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agario - Вхід</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f1b; --card-bg: rgba(25, 25, 35, 0.85);
            --primary: #00ff88; --secondary: #00e5ff; --danger: #ff3366;
        }
        body {
            margin: 0; padding: 0; font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color); background-image: radial-gradient(circle at 50% 50%, #2a2a4a 0%, #0f0f1b 100%);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 400px; background: var(--card-bg); padding: 40px; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(0, 255, 136, 0.1); color: white;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        h1 { font-weight: 900; font-size: 2rem; margin-bottom: 30px; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { width: 100%; padding: 15px 20px; margin-bottom: 20px; background: rgba(0,0,0,0.2); border: 2px solid rgba(255,255,255,0.1); border-radius: 50px; color: white; font-size: 1rem; outline: none; box-sizing: border-box;}
        button { width: 100%; padding: 15px; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-bottom: 10px;}
        .btn-primary { background: var(--primary); color: #0f0f1b; }
        .btn-secondary { background: transparent; color: #8892b0; }
        .alert { padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; display: none; }
        .alert.error { background: rgba(255,51,102,0.2); color: var(--danger); display: block; }
        .alert.success { background: rgba(0,255,136,0.2); color: var(--primary); display: block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="form-title">Вхід у гру</h1>
        <div id="message-box" class="alert hidden"></div>
        <input type="text" id="nick" placeholder="Твій нікнейм" autocomplete="off">
        <input type="password" id="password" placeholder="Пароль">
        <button id="submit-btn" class="btn-primary" onclick="handleAuth()">ГРАТИ</button>
        <button id="toggle-btn" class="btn-secondary" onclick="toggleMode()">Немає акаунту? Створити</button>
    </div>

    <script>
        let isLoginMode = true;
        const baseUrl = '/api';

        // Якщо гравець вже залогінений, одразу кидаємо його в гру
        if (localStorage.getItem('playerId')) {
            window.location.href = '/game/';
        }

        function showMessage(text, type) {
            const msgBox = document.getElementById('message-box');
            msgBox.className = `alert ${type}`;
            msgBox.innerText = text;
            setTimeout(() => msgBox.className = 'alert hidden', 3000);
        }

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('form-title').innerText = isLoginMode ? 'Вхід у гру' : 'Реєстрація';
            document.getElementById('submit-btn').innerText = isLoginMode ? 'ГРАТИ' : 'ЗАРЕЄСТРУВАТИСЬ';
            document.getElementById('toggle-btn').innerText = isLoginMode ? 'Немає акаунту? Створити' : 'Вже є акаунт? Увійти';
        }

        async function handleAuth() {
            const nick = document.getElementById('nick').value;
            const password = document.getElementById('password').value;
            if (!nick || !password) return showMessage('Заповніть всі поля!', 'error');

            const url = baseUrl + (isLoginMode ? '/login/' : '/register/');

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nick, password })
                });
                const data = await response.json();

                if (response.ok) {
                    if (isLoginMode) {
                        // ЗБЕРІГАЄМО ДАНІ В БРАУЗЕРІ ТА ПЕРЕХОДИМО НА СТОРІНКУ ГРИ
                        localStorage.setItem('playerId', data.player_id);
                        localStorage.setItem('playerNick', nick);
                        localStorage.setItem('playerBest', data.best_size || 0);
                        window.location.href = '/game/';
                    } else {
                        showMessage('Реєстрація успішна! Тепер увійдіть.', 'success');
                        toggleMode();
                    }
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('Помилка з\'єднання з сервером', 'error');
            }
        }
    </script>
</body>
</html>
